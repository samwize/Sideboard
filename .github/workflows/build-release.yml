name: Build and Release

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

jobs:
  release:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Import signing certificate
        env:
          DEVELOPER_ID_CERT_P12: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)

          echo -n "$DEVELOPER_ID_CERT_P12" | base64 --decode -o $CERT_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          CERT_PASS=$(echo -n "$DEVELOPER_ID_CERT_PASSWORD" | tr -d ' ')
          security import $CERT_PATH -P "$CERT_PASS" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Build
        run: xcodebuild -project Sideboard.xcodeproj -scheme Sideboard -configuration Release build SYMROOT=build

      - name: Sign
        run: |
          codesign --force --deep --options runtime \
            --sign "Developer ID Application: Just2us Pte Ltd (DNGV8KJAPW)" \
            build/Release/Sideboard.app
          codesign --verify --deep --strict build/Release/Sideboard.app

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          ditto -c -k --keepParent build/Release/Sideboard.app build/Sideboard.zip
          xcrun notarytool submit build/Sideboard.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait
          xcrun stapler staple build/Release/Sideboard.app

      - name: Create DMG
        run: |
          rm -rf build/dmg Sideboard.dmg
          mkdir -p build/dmg/.background
          cp -R build/Release/Sideboard.app build/dmg/
          ln -s /Applications build/dmg/Applications
          cp Resources/dmg-background.png build/dmg/.background/
          cp Resources/dmg-DS_Store build/dmg/.DS_Store
          hdiutil create -volname Sideboard -srcfolder build/dmg -ov -format UDZO Sideboard.dmg
          rm -rf build/dmg

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ inputs.tag }} Sideboard.dmg \
            --title "Sideboard ${{ inputs.tag }}" \
            --generate-notes

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/signing.keychain-db || true
