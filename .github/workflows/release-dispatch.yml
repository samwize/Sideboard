name: Release (one-click)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.2)'
        required: true

permissions:
  contents: write

jobs:
  bump:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bump version
        run: |
          sed -i '' "s/MARKETING_VERSION = .*/MARKETING_VERSION = ${{ github.event.inputs.version }};/" Sideboard.xcodeproj/project.pbxproj
          awk '/CURRENT_PROJECT_VERSION/{sub(/[0-9]+/, $3+1)}1' Sideboard.xcodeproj/project.pbxproj > tmp && mv tmp Sideboard.xcodeproj/project.pbxproj

      - name: Commit, tag, and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Sideboard.xcodeproj/project.pbxproj
          git commit -m "chore: bump version to ${{ github.event.inputs.version }}"
          git tag v${{ github.event.inputs.version }}
          git push origin main --tags

  release:
    needs: bump
    uses: ./.github/workflows/build-release.yml
    with:
      tag: v${{ github.event.inputs.version }}
    secrets: inherit
